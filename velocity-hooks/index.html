    <style>
        body { 
            background: radial-gradient(circle at 50% 0%, #2E0057 0%, #0F0518 80%); 
            color: white; 
            min-height: 100vh; 
            overflow-x: hidden;
        }
        
        .glass-panel { 
            background: rgba(255, 255, 255, 0.03); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.08); 
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }

        .input-field {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
        }
        .input-field:focus {
            background: rgba(0, 0, 0, 0.6);
            border-color: #00D4FF;
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.2);
        }

        .hook-card { 
            transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.2s; 
            position: relative; 
            overflow: hidden; 
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .hook-card:hover { 
            transform: translateY(-4px); 
            border-color: #FFD700; 
            background: rgba(255,255,255,0.06); 
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); 
        }
        
        .copied-overlay {
            position: absolute; inset: 0; background: #00D4FF; display: flex; 
            align-items: center; justify-content: center; font-weight: 900; 
            text-transform: uppercase; transform: translateY(100%); transition: transform 0.2s;
            color: #0F0518; font-family: 'Montserrat', sans-serif; z-index: 50;
        }
        .hook-card.copied .copied-overlay { transform: translateY(0); }

        .highlight { color: #FFD700; font-weight: 700; }
        
        /* Logic Console Styles */
        .logic-console {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            opacity: 0.6;
            transition: opacity 0.2s;
        }
        .hook-card:hover .logic-console { opacity: 1; }

        .logic-group { display: flex; gap: 4px; align-items: center; }
        .logic-label { font-size: 9px; text-transform: uppercase; font-weight: 700; color: #666; margin-right: 4px; display: none; }
        @media (min-width: 768px) { .logic-label { display: block; } }
        
        .logic-btn {
            font-size: 8px; padding: 2px 6px; border-radius: 3px; 
            border: 1px solid rgba(255,255,255,0.1); color: #888; cursor: pointer;
            transition: all 0.2s; text-transform: uppercase; font-weight: 600;
        }
        .logic-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        
        /* Active States */
        .logic-btn.active.action { background: #00D4FF; color: #000; border-color: #00D4FF; }
        .logic-btn.active.pain { background: #FF4B4B; color: #fff; border-color: #FF4B4B; }
        .logic-btn.active.noun { background: #4B0082; color: #fff; border-color: #4B0082; }

    </style>

        function saveToStorage() {

            document.getElementById('input-pain').value = localStorage.getItem('hookgym_pain') || '';

        // --- FIXED CONJUGATION FUNCTION ---
        function getVars(phrase, mode = 'auto') {
            if (!phrase) return { root: '...', ing: '...', ed: '...' };
            
            const words = phrase.split(' ');
            const first = words[0];
            const rest = words.slice(1).join(' ');
            
            let result = { root: phrase, ing: phrase, ed: phrase };
            
            // If mode is 'noun', return everything as-is (no conjugation)
            if (mode === 'noun') {
                return result;
            }
            
            // If mode is 'verb' OR 'auto', attempt conjugation
            if (mode === 'verb' || mode === 'auto') {
                // Check if compromise library is loaded
                const doc = window.nlp ? window.nlp(first) : null;
                const isVerb = doc && doc.verbs().length > 0;
                
                // Only conjugate if it's actually a verb (or if forced via 'verb' mode)
                if (isVerb || mode === 'verb') {
                    if (doc && doc.verbs().length > 0) {
                        const conjugated = doc.verbs().conjugate()[0];
                        if (conjugated) {
                            result.root = (conjugated.Infinitive || first) + (rest ? ' ' + rest : '');
                            result.ing = (conjugated.Gerund || first + 'ing') + (rest ? ' ' + rest : '');
                            result.ed = (conjugated.PastTense || first + 'ed') + (rest ? ' ' + rest : '');
                        }
                    } else {
                        // Fallback conjugation if NLP fails or word not found
                        // Simple heuristic fallbacks
                        let ing = first;
                        let ed = first;
                        if(first.endsWith('e')) {
                             ing = first.slice(0, -1) + 'ing';
                             ed = first + 'd';
                        } else {
                            ing = first + 'ing';
                            ed = first + 'ed';
                        }

                        result.ing = ing + (rest ? ' ' + rest : '');
                        result.ed = ed + (rest ? ' ' + rest : '');
                    }
                }
            }
            
            return result;
        }

        // --- GENERATION ---
        function spinTheWheel() {
            saveToStorage();

            const shuffled = [...templateVault]; 
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            const selectedHooks = shuffled.slice(0, 20);

            const grid = document.getElementById('hooks-grid');
            const resultsArea = document.getElementById('results-area');
            grid.innerHTML = '';
            resultsArea.classList.remove('hidden');

            setTimeout(() => { resultsArea.scrollIntoView({ behavior: 'smooth', block: 'start' }); }, 100);

            selectedHooks.forEach((template, index) => {
                const card = createCard(template, index);
                grid.appendChild(card);
                updateCardText(card, 'auto', 'auto'); 
            });
        }

        function createCard(template, index) {
            const card = document.createElement('div');
            card.className = "hook-card glass-panel p-5 rounded-xl border border-white/5 animate-fadeIn";
            card.style.animationDelay = `${index * 0.05}s`;
            
            card.dataset.template = JSON.stringify(template);
            card.dataset.benMode = 'auto';
            card.dataset.painMode = 'auto';

            let tagColor = "text-gray-400 bg-white/5 border border-white/10";
            if(template.cat === 'Contrarian') tagColor = "text-red-400 bg-red-400/10 border border-red-400/20";
            if(template.cat === 'How-To') tagColor = "text-green-400 bg-green-400/10 border border-green-400/20";
            if(template.cat === 'Urgency') tagColor = "text-calico-yellow bg-yellow-400/10 border border-yellow-400/20";
            if(template.cat === 'Trust') tagColor = "text-calico-accent bg-cyan-400/10 border border-cyan-400/20";
            if(template.cat === 'List') tagColor = "text-purple-400 bg-purple-400/10 border border-purple-400/20";
            if(template.cat === 'Story') tagColor = "text-orange-400 bg-orange-400/10 border border-orange-400/20";
            if(template.cat === 'Question') tagColor = "text-pink-400 bg-pink-400/10 border border-pink-400/20";

            card.innerHTML = `
                <div class="flex justify-between items-center mb-3">
                    <span class="hook-category text-[9px] font-black uppercase tracking-wider px-2 py-1 rounded ${tagColor}">${template.cat}</span>
                    <button class="text-white/20 hover:text-white transition-colors" onclick="copySingleCard(this)" title="Copy Text">
                        <i class="fas fa-copy"></i>
                    </button>
                </div>
                
                <p class="text-md md:text-lg leading-snug text-gray-200 font-medium font-sans mb-4 hook-text select-text">
                    Loading...
                </p>

                <!-- Logic Console -->
                <div class="logic-console">
                    <div class="logic-group">
                        <span class="logic-label text-calico-accent">Act</span>
                        <button class="logic-btn active action" onclick="toggleCardMode(this, 'ben', 'auto')">Auto</button>
                        <button class="logic-btn" onclick="toggleCardMode(this, 'ben', 'verb')">Verb</button>
                        <button class="logic-btn" onclick="toggleCardMode(this, 'ben', 'noun')">Noun</button>
                    </div>
                    <div class="logic-group">
                        <span class="logic-label text-calico-danger">Pain</span>
                        <button class="logic-btn active action" onclick="toggleCardMode(this, 'pain', 'auto')">Auto</button>
                        <button class="logic-btn" onclick="toggleCardMode(this, 'pain', 'verb')">Verb</button>
                        <button class="logic-btn" onclick="toggleCardMode(this, 'pain', 'noun')">Noun</button>
                    </div>
                </div>

                <div class="copied-overlay">COPIED!</div>
            `;
            return card;
        }

        function toggleCardMode(btn, type, mode) {
            const card = btn.closest('.hook-card');
            
            // UI Update
            const group = btn.parentElement;
            Array.from(group.children).forEach(b => {
                if(b.tagName === 'BUTTON') {
                    b.className = 'logic-btn'; 
                    if(b === btn) {
                        if(mode === 'auto') b.className += ' active action'; 
                        if(mode === 'verb' && type === 'ben') b.className += ' active action';
                        if(mode === 'noun' && type === 'ben') b.className += ' active noun';
                        if(mode === 'verb' && type === 'pain') b.className += ' active pain';
                        if(mode === 'noun' && type === 'pain') b.className += ' active noun';
                    }
                }
            });

            if(type === 'ben') card.dataset.benMode = mode;
            if(type === 'pain') card.dataset.painMode = mode;

            updateCardText(card, card.dataset.benMode, card.dataset.painMode);
        }

        function updateCardText(card, benMode, painMode) {
            const template = JSON.parse(card.dataset.template);
            
            // LIVE READ from Inputs
            const liveTopic = document.getElementById('input-topic').value.trim() || "Marketing";
            const liveAudience = document.getElementById('input-audience').value.trim() || "Founders";
            const livePain = document.getElementById('input-pain').value.trim() || "Waste Money";
            const liveBen = document.getElementById('input-benefit').value.trim() || "Save Time";

            const benVars = getVars(liveBen, benMode);
            const painVars = getVars(livePain, painMode);

            let displayHtml = template.text
                .replace(/{t}/g, `<span class="highlight">${liveTopic}</span>`)
                .replace(/{a}/g, `<span class="highlight">${liveAudience}</span>`)
                .replace(/{p_root}/g, `<span class="highlight text-calico-danger">${painVars.root}</span>`)
                .replace(/{p_ing}/g, `<span class="highlight text-calico-danger">${painVars.ing}</span>`)
                .replace(/{p_ed}/g, `<span class="highlight text-calico-danger">${painVars.ed}</span>`)
                .replace(/{b_root}/g, `<span class="highlight text-calico-accent">${benVars.root}</span>`)
                .replace(/{b_ing}/g, `<span class="highlight text-purple-400">${benVars.ing}</span>`)
                .replace(/{b_ed}/g, `<span class="highlight text-green-400">${benVars.ed}</span>`);

            card.querySelector('.hook-text').innerHTML = displayHtml;
        }

        function copySingleCard(btn) {
            const card = btn.closest('.hook-card');
            const text = card.querySelector('.hook-text').innerText;
            navigator.clipboard.writeText(text);
            
            card.classList.add('copied');
            setTimeout(() => card.classList.remove('copied'), 1500);
            showToast("Hook Copied!");
        }

        function copyAllHooks() {
            const cards = document.querySelectorAll('.hook-card');
            if(cards.length === 0) return;

            let clipboardText = "";
            let count = 1;
            
            cards.forEach(card => {
                const text = card.querySelector('.hook-text').innerText;
                const cat = card.querySelector('.hook-category').innerText;
                clipboardText += `${count}. [${cat}] ${text}\n`;
                count++;
            });

            navigator.clipboard.writeText(clipboardText);
            showToast(`Copied List of ${cards.length}!`);
        }

        function exportToCSV() {
            const hooks = [];
            // Header
            hooks.push(["Category", "Hook"]);

            const cards = document.querySelectorAll('.hook-card');
            if(cards.length === 0) return;

            cards.forEach(card => {
                const category = card.querySelector('.hook-category').innerText;
                const text = card.querySelector('.hook-text').innerText;
                // Escape quotes for CSV format
                hooks.push([category, `"${text.replace(/"/g, '""')}"`]);
            });

            let csvContent = "data:text/csv;charset=utf-8,";
            hooks.forEach(row => {
                csvContent += row.join(",") + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "Velocity_Hooks_Export.csv");
            document.body.appendChild(link); // Required for FF
            link.click();
            document.body.removeChild(link);
            
            showToast("CSV Downloaded!");
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = message;
            toast.classList.remove('translate-y-20', 'opacity-0');
            setTimeout(() => {
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }
